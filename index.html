<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker 1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#c0ffb4]">
    <!-- ----------- NAVIGATION BAR ----------- -->
    <nav class="flex justify-between items-center p-[24px] bg-[#fff] m-5 rounded-md shadow-xl">
        <h1 
            class="text-gray-950 text-[1.6rem] font-[800]"
        >
            Expense Tracker
        </h1>
        <div class="flex justify-evenly max-[790px]:hidden space-x-10">
            <a class=" text-gray-950 text-[1rem] font-[400] hover:underline" href="#">Profiles</a>
            <a class=" text-gray-950 text-[1rem] font-[400] hover:underline" href="#">Transactions</a>
            <a class=" text-gray-950 text-[1rem] font-[400] hover:underline" href="#">Budgets</a>
            <a class=" text-gray-950 text-[1rem] font-[400] hover:underline" href="#">Report</a>
            <a class=" text-gray-950 text-[1rem] font-[400] hover:underline" href="#">Settings</a>
        </div>

        <div class="hidden items-center max-[790px]:flex">
            <i class=" text-gray-950 text-[1.2rem] font-[400] fa-solid fa-bars"></i>
        </div>
    </nav>


    <!-- ----------- ADDING EXPENSE SECTION ---------------- -->
     <section class="mx-5 block p-[24px] bg-[#fff] m-5 rounded-lg shadow-lg">
        <form class="flex justify-evenly items-center gap-4 mb-5 max-md:flex max-lg:flex-col ">
            <!-- -------expense------- -->
            <div class="bg-[#7bf064] flex flex-col space-y-2 p-4 rounded-md shadow-lg w-[400px] max-[460px]:w-[300px]  max-[380px]:w-[200px]">
                <label class="text-[0.9rem] text-gray-950 font-[500]" for="expense">Expense Name</label>
                <input 
                    class="bg-gray-100 h-[40px] border-[1px] outline-gray-400 border-[#584242] px-2 rounded-md"
                    type="text"
                    placeholder="Expense Name"
                    id="expense"
                    required
                />
            </div>

            <!-- ---- amount ------- -->
            <div class="bg-[#7bf064] flex flex-col space-y-2 p-4 rounded-md shadow-lg w-[400px] max-[460px]:w-[300px] max-[380px]:w-[200px]">
                <label class="text-[0.9rem] text-gray-950 font-[500]" for="amount">Amount</label>
                <input 
                    class="bg-gray-100 h-[40px] border-[1px] outline-gray-400 border-[#584242] px-2 rounded-md"
                    type="number"
                    placeholder="Amount"
                    id="amount"
                    required
                />
            </div>

            <!-- ------- -->
            <div class="bg-[#7bf064] flex flex-col space-y-2 p-4 rounded-md shadow-lg w-[400px] max-[460px]:w-[300px] max-[380px]:w-[200px]">
                <label class="text-[0.9rem] text-gray-950 font-[500]" for="date">Date</label>
                <input 
                    class="bg-gray-100 h-[40px] border-[1px] outline-gray-400 border-[#584242] px-2 rounded-md"
                    type="date"
                    placeholder=""
                    id="date"
                    required
                />
            </div>

            <!-- -----categories---------- -->
            <div class="bg-[#7bf064] flex flex-col space-y-2 p-4 rounded-md shadow-lg w-[400px] max-[460px]:w-[300px] max-[380px]:w-[200px]">
                <label class="text-[0.9rem] text-gray-950 font-[500]" for="expense">Category</label>
                <select 
                    class="bg-gray-100 h-[40px] border-[1px] outline-gray-400 border-[#584242] px-2 rounded-md"
                    name="categories" 
                    id="categories">
                    <option value="#" disabled>Select Category</option>
                    <option value="food">Food</option>
                    <option value="bills">House Bills</option>
                    <option value="stationery">Stationery Items</option>
                    <option value="others">Others</option>
                </select>
            </div>
        </form>
        
        <button 
            class="block items-center gap-2 w-[calc(100%-100px)] max-[350px]:w-[100%] rounded-md shadow-md h-[40px] m-auto bg-[#20b601] text-gray-50 font-[600] px-4 "
            type="submit">
                <i class="text-[0.8rem] fa-solid fa-plus"></i>
                Add Expense
        </button>
     </section>

    <!-- ------------- EXPENSE REC0RD ------------------------ -->
     <section class="m-5 block p-[24px] bg-[#fff] rounded-md shadow-xl">
        <h1 class="text-center text-[1.5rem] font-[600] mb-3">Expense Record</h1>

        <div class="flex flex-col p-4">
            <table class="bg-slate-50">
                <tr>
                    <th class="border-[1px] h-9 max-sm:h-6 max-sm:text-[0.6rem]">Expense Name</th>
                    <th class="border-[1px] h-9 max-sm:h-6 max-sm:text-[0.6rem]">Amount</th>
                    <th class="border-[1px] h-9 max-sm:h-6 max-sm:text-[0.6rem]">Date</th>
                    <th class="border-[1px] h-9 max-sm:h-6 max-sm:text-[0.6rem]">Category</th>
                    <th class="border-[1px] h-9 max-sm:h-6 max-sm:text-[0.6rem]">Credit/Debit</th>
                </tr>
            </table>

            <div class="h-[60px] bg-slate-50 text-center border-[1px] border-t-0" >
                <p class="text-[1rem] mt-4 font-bold text-gray-500 max-sm:text-[0.8rem]">No expenses recorded</p>
            </div>
        </div>
        
     </section>
</body>
</html>
