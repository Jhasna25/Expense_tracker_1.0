<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker 1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#c0ffb4]">
    <!-- ----------- NAVIGATION BAR ----------- -->
    <nav class="flex justify-between items-center p-[24px] bg-[#fff] m-5 rounded-md shadow-xl">
        <h1 
            class="text-gray-900 text-[1.6rem] font-[800]"
        >
            Expense Tracker
        </h1>
        <div class="flex justify-evenly items-center max-[870px]:hidden space-x-10">
            <a class=" text-green-600 text-[1.1rem] font-[600] hover:underline" href="index.html">Home</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="transaction.html">Transactions</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="budget.html">Budgets</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="#">Report</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="#">Settings</a>

            <div class="ml-2">
                <a href="profile.html"><i class="text-green-500 text-[1.6rem] fa-regular fa-circle-user"></i></a>
            </div>
        </div>

        <div class="hidden items-center max-[870px]:flex">
            <i class=" text-gray-900 text-[1.2rem] font-[400] fa-solid fa-bars"></i>
        </div>
    </nav>


    <!-- ----------- ADDING EXPENSE SECTION ---------------- -->
     <section class="mx-5 block m-5 bg-[#fff] p-15 rounded-md shadow-lg">
         <h1 class="flex items-center p-4 h-11 mb-4 justify-center gap-2 text-green-600 text-[1.2rem] font-[500]">Add your expenses here</h1>

        <form class="grid grid-cols-2 gap-8 mb-4 max-sm:grid-cols-1">
            <!-- -------expense------- -->
            <div class="flex flex-col space-y-2 w-[100%]">
                <label class="text-[0.9rem] text-gray-900 font-[500]" for="expense">Expense Name</label>
                <input 
                    class="bg-gray-50 h-[40px] outline-gray-400 border-1 border-gray-400 px-2 rounded-md"
                    type="text"
                    placeholder="Expense Name"
                    id="expense"
                    required
                />
            </div>

            <!-- ---- amount ------- -->
            <div class="flex flex-col space-y-2 w-[100%]">
                <label class="text-[0.9rem] text-gray-900 font-[500]" for="amount">Amount</label>
                <input 
                    class="bg-gray-50 h-[40px] outline-gray-400 border-1 border-gray-400 px-2 rounded-md"
                    type="number"
                    placeholder="Amount"
                    id="amount"
                    required
                />
            </div>

            <!-- ------- -->
            <div class="flex flex-col space-y-2 w-[100%]">
                <label class="text-[0.9rem] text-gray-900 font-[500]" for="date">Date</label>
                <input 
                    class="bg-gray-50 h-[40px] outline-gray-400 border-1 border-gray-400 px-2 rounded-md"
                    type="date"
                    placeholder="dd/mm/yy"
                    id="date"
                    required
                />
            </div>

            <!-- -----categories---------- -->
            <div class="flex flex-col space-y-2 w-[100%]">
                <label class="text-[0.9rem] text-gray-900 font-[500]" for="expense">Category</label>
                <select 
                    class="bg-gray-50 h-[40px] outline-gray-400 border-1 border-gray-400 px-2 rounded-md"
                    name="categories" 
                    id="categories">
                    <option value="#" disabled selected>Select Category</option>
                    <option value="food">Food</option>
                    <option value="bills">House Bills</option>
                    <option value="stationery">Stationery Items</option>
                    <option value="others">Others</option>
                </select>
            </div>
        </form>
        
        <button 
            class="block items-center gap-2 w-[100%] rounded-md shadow-md h-[40px] m-auto bg-green-400 hover:bg-green-300 hover:text-gray-600 cursor-pointer text-gray-100 font-[600]"
            type="submit">
                <i class="text-[0.8rem] fa-solid fa-plus"></i>
                Add Expense
        </button>
     </section>

    <!-- ------------- EXPENSE REC0RD ------------------------ -->
     <section class="m-5 block">
        <h1 class="p-[24px] text-center text-[1.5rem] font-[700] mb-3">Recent Expense Record</h1>

        <div class="flex flex-col bg-[#fff] border-1 rounded-lg shadow-xl">
            <table class= "rounded-md ">
                <tr class="">
                    <th class="h-9 max-sm:h-6 text-gray-900 border-r-1 max-sm:text-[0.6rem]">Date</th>
                    <th class="h-9 max-sm:h-6 text-gray-900 border-r-1 max-sm:text-[0.6rem]">Expense Name</th>
                    <th class="h-9 max-sm:h-6 text-gray-900 border-r-1 max-sm:text-[0.6rem]">Category</th>
                    <th class="h-9 max-sm:h-6 text-gray-900 border-r-1 max-sm:text-[0.6rem]">Payment Method</th>
                    <th class="h-9 max-sm:h-6 text-gray-900 max-sm:text-[0.6rem]">Amount</th>
                </tr>

                <!-- <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr> -->
            </table>

            <div class="h-[60px] text-center border-t-1 bg" >
                <p class="text-[1rem] mt-4 font-bold text-gray-600 max-sm:text-[0.8rem]">No expenses recorded</p>
            </div>
        </div>
        
     </section>
</body>
</html>
