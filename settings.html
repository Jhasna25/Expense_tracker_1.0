<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
</head>
<body class="bg-[#c0ffb4]">
    <!-- ----------- NAVIGATION BAR ----------- -->
    <nav class="flex justify-between items-center p-6 bg-[#fff] m-5 rounded-md shadow-xl">
        <h1 class="text-gray-900 text-[1.6rem] font-[800]">
            Settings
        </h1>
        <div class="flex justify-evenly items-center max-[870px]:hidden space-x-10">
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="index.html">Home</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="transaction.html">Transactions</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="budget.html">Budgets</a>
            <a class=" text-gray-900 text-[1rem] font-[400] hover:underline" href="#">Report</a>
            <a class=" text-green-600 text-[1.1rem] font-[600] hover:underline" href="settings.html">Settings</a>

            <div class="ml-2">
                <a href="profile.html"><i class="text-green-500 text-[1.6rem] fa-regular fa-circle-user"></i></a>
            </div>
        </div>

        <div class="hidden items-center max-[870px]:flex">
            <i class=" text-gray-900 text-[1.2rem] font-[400] fa-solid fa-bars"></i>
        </div>
    </nav>

    <!-- --------------------MAIN SECTION--------------------------------- -->
    <section class="grid grid-cols-2 p-6 m-5 bg-[#fff] rounded-lg shadow-lg max-lg:grid-cols-1">
        <div class="flex flex-col justify-start items-center ml-8 p-6">
            <div class="h-[250px] w-[250px] flex flex-col justify-center mb-4">
                <!-- Profile image --> 
                 <img 
                    class="rounded-[50%]"
                    src="profile.jpg" alt=""
                />
            </div> 
            <div class="m-auto flex flex-col gap-3 max-lg:flex-row max-md:flex-col">
                <button class="bg-green-400 text-gray-100 font-[600] text-[1rem] px-7 rounded-md  h-12 shadow-lg hover:text-gray-800 hover:bg-green-300">Edit Profile</button>
                <button class="bg-green-400 text-gray-100 font-[600] text-[1rem] px-7 rounded-md  h-12 shadow-lg hover:text-gray-800 hover:bg-green-300">
                    <i class="fa-solid fa-plus"></i> Add account
                </button>
                <button class="bg-green-400/50 text-red-500 font-[600] text-[1rem] px-7 rounded-md  h-12 shadow-lg hover:text-gray-800 hover:bg-green-300">
                    Delete account
                </button>
            </div>
        </div>


        <!-- -------------------- -->
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center border-1 border-green-400/20 bg-green-100/80 px-4 h-16 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                <label class="text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem" for="preferences">Account Preferences</label>
                <select 
                    class="p-2 w-[calc(100%-300px)] max-sm:w-[calc(100%-200px)] max-[450px]:w-[calc(100%-80px)] border-1 border-green-500 rounded-md bg-gray-50/100"
                    name="preference" 
                    id="preference">
                    <option value="#" disabled selected>Select</option>
                    <option value="auto">Auto</option>
                    <option value="customise">Custom</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-1 border-gray-400/20 bg-green-100/80 px-4 h-16 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                <label class="text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem" for="preferences">Theme</label>
                <select 
                    class="p-2 w-[calc(100%-300px)] max-sm:w-[calc(100%-200px)] max-[450px]:w-[calc(100%-80px)] border-1 border-green-500 rounded-md bg-gray-50/100"
                    name="preference" 
                    id="preference">
                    <option value="#" disabled selected>Select</option>
                    <option value="system">System</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-1 border-gray-400/20 bg-green-100/80 px-4 h-16 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                <label class="text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem" for="preferences">Currency</label>
                <select 
                    class="p-2 w-[calc(100%-300px)] max-sm:w-[calc(100%-200px)] max-[450px]:w-[calc(100%-80px)] border-1 border-green-500 rounded-md bg-gray-50/100"
                    name="preference" 
                    id="preference">
                    <option value="#" disabled selected>Select</option>
                    <option value="rupee">INR</option>
                    <option value="usd">USD</option>                    
                    <option value="euro">EUR</option>
                    <option value="yen">JPY</option>
                    <option value="pound">GBP</option>
                </select>
            </div>

            
            <h1 class="flex justify-between items-center text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem border-1 border-gray-400/20 bg-green-100/80 px-4 h-16 pe-4 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                Privacy & Security
                <i class="fa-solid fa-angle-down"></i>
            </h1>
            
            <h1 class="flex justify-between items-center text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem border-1 border-gray-400/20 bg-green-100/80 px-4 h-16 pe-4 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                Help & Support
            </h1>

            <h1 class="flex justify-between items-center text-[1.1rem] font-[700] text-gray-800 max-sm:text-[0.9rem] max-[450px]:text-0.6rem border-1 border-gray-400/20 bg-green-100/80 px-4 h-16 pe-4 rounded-md shadow-lg cursor-pointer hover:translate-x-1">
                Premium Plans
            </h1>
        </div>
    </section>
</body>
</html>
